name; cipipeline

on:
 push:
  branch: [ main ]

  jobs:
   build:
   runs-on: ubuntu-latest

   steps:
    - name; checkout code
      uses; actions/checkout@v5

     - name; set up Node.js
      uses; actions/setup-nodejs@v3
      with;
        node-version; 16

  - name;Install depedencies
    run: npm Install

  - name; Run tests
    run: npm test